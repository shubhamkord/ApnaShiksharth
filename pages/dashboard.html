<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Apna Shiksharth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body { padding-top: 70px; }
    .dash-layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 70px); }
    /* Sidebar */
    .dash-sidebar { background: var(--bg-surface); border-right: 1px solid var(--clr-border); padding: 28px 0; position: sticky; top: 70px; height: calc(100vh - 70px); overflow-y: auto; }
    .sidebar-profile { padding: 0 24px 24px; border-bottom: 1px solid var(--clr-border); margin-bottom: 16px; }
    .sidebar-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.25rem; font-weight: 700; font-family: var(--font-heading); margin-bottom: 12px; }
    .sidebar-name { font-family: var(--font-heading); font-weight: 700; font-size: 1rem; color: var(--text-primary); }
    .sidebar-email { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; word-break: break-all; }
    .sidebar-nav { list-style: none; padding: 0 12px; }
    .sidebar-nav li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 500; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; }
    .sidebar-nav li a:hover, .sidebar-nav li a.active { background: rgba(59,130,246,0.08); color: var(--clr-primary); }
    .sidebar-nav li a i { width: 18px; text-align: center; font-size: 0.95rem; }
    .sidebar-nav .nav-divider { height: 1px; background: var(--clr-border); margin: 12px 4px; }
    /* Main content */
    .dash-main { padding: 36px 40px; background: var(--bg-body); }
    .dash-welcome { margin-bottom: 32px; }
    .dash-welcome h1 { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .dash-welcome p { color: var(--text-secondary); font-size: 0.95rem; }
    /* Stats row */
    .dash-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 36px; }
    .dash-stat { background: var(--bg-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-lg); padding: 24px; display: flex; align-items: center; gap: 16px; box-shadow: var(--shadow-sm); transition: all 0.2s; }
    .dash-stat:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .stat-ico { width: 48px; height: 48px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .ico-blue   { background: rgba(59,130,246,0.1); color: #3B82F6; }
    .ico-green  { background: rgba(16,185,129,0.1); color: #10B981; }
    .ico-amber  { background: rgba(245,158,11,0.1); color: #F59E0B; }
    .stat-val { font-family: var(--font-heading); font-size: 1.75rem; font-weight: 800; color: var(--text-primary); line-height: 1; }
    .stat-lbl { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; margin-top: 4px; }
    /* Enrolled courses */
    .section-title { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .section-title a { font-size: 0.85rem; font-weight: 600; color: var(--clr-primary); }
    .enrolled-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .enrolled-card { background: var(--bg-surface); border: 1px solid var(--clr-border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.25s; display: flex; flex-direction: column; }
    .enrolled-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .enrolled-img { width: 100%; height: 140px; object-fit: cover; }
    .enrolled-body { padding: 16px; flex: 1; }
    .enrolled-category { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--clr-primary); background: rgba(59,130,246,0.1); padding: 3px 10px; border-radius: 999px; display: inline-block; margin-bottom: 8px; }
    .enrolled-title { font-family: var(--font-heading); font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; line-height: 1.35; }
    .progress-bar-wrap { height: 6px; background: var(--clr-border); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .progress-bar-fill { height: 100%; background: var(--gradient-primary); border-radius: 3px; transition: width 1s ease; }
    .progress-label { font-size: 0.75rem; color: var(--text-muted); }
    .enrolled-footer { padding: 12px 16px; border-top: 1px solid var(--clr-border); display: flex; justify-content: space-between; align-items: center; }
    .continue-btn { font-size: 0.82rem; font-weight: 600; color: var(--clr-primary); text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .enrolled-instructor { font-size: 0.78rem; color: var(--text-muted); }
    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; background: var(--bg-surface); border: 2px dashed var(--clr-border); border-radius: var(--radius-xl); }
    .empty-state i { font-size: 3rem; color: var(--clr-primary); margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .empty-state p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, var(--clr-border) 25%, rgba(255,255,255,0.4) 50%, var(--clr-border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }
    /* Responsive */
    @media (max-width: 1024px) {
      .dash-layout { grid-template-columns: 220px 1fr; }
      .dash-main { padding: 28px 28px; }
      .enrolled-grid { grid-template-columns: 1fr; }
      .dash-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .dash-layout { grid-template-columns: 1fr; }
      .dash-sidebar { display: none; }
      .dash-main { padding: 20px 16px; }
      .dash-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header id="navbar" style="position:fixed;top:0;left:0;right:0;z-index:200;background:var(--bg-nav);backdrop-filter:blur(20px);border-bottom:1px solid var(--clr-border);box-shadow:0 1px 8px rgba(0,0,0,0.06);">
    <nav style="max-width:100%;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;">
      <a href="/" style="display:flex;align-items:center;gap:10px;font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--text-primary);text-decoration:none;">
        <span style="width:36px;height:36px;border-radius:10px;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.95rem;"><i class="fas fa-graduation-cap"></i></span>
        Apna <strong style="color:var(--clr-primary);">Shiksharth</strong>
      </a>
      <div style="display:flex;gap:14px;align-items:center;">
        <a href="/courses" style="font-size:0.9rem;font-weight:500;color:var(--text-secondary);text-decoration:none;">Courses</a>
        <a href="/contact" style="font-size:0.9rem;font-weight:500;color:var(--text-secondary);text-decoration:none;">Contact</a>
        <button id="logout-btn" class="btn btn-outline btn-sm" style="font-size:0.85rem;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </nav>
  </header>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar">
      <div class="sidebar-profile">
        <div class="sidebar-avatar" id="sb-avatar">?</div>
        <div class="sidebar-name" id="sb-name">Loading…</div>
        <div class="sidebar-email" id="sb-email"></div>
      </div>
      <ul class="sidebar-nav">
        <li><a href="/dashboard" class="active"><i class="fas fa-th-large"></i> Dashboard</a></li>
        <li><a href="/courses"><i class="fas fa-book-open"></i> Browse Courses</a></li>
        <li><a href="#enrolled-section"><i class="fas fa-play-circle"></i> My Courses</a></li>
        <li><div class="nav-divider"></div></li>
        <li><a href="/contact"><i class="fas fa-headset"></i> Support</a></li>
        <li><a href="/about"><i class="fas fa-info-circle"></i> About Us</a></li>
        <li><div class="nav-divider"></div></li>
        <li><a href="#" id="sb-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="dash-main">
      <div class="dash-welcome">
        <h1 id="welcome-msg">Welcome back! 👋</h1>
        <p id="welcome-sub">Here's your learning progress at a glance.</p>
      </div>

      <!-- Stats -->
      <div class="dash-stats">
        <div class="dash-stat">
          <div class="stat-ico ico-blue"><i class="fas fa-book-open"></i></div>
          <div>
            <div class="stat-val" id="stat-enrolled">0</div>
            <div class="stat-lbl">Courses Enrolled</div>
          </div>
        </div>
        <div class="dash-stat">
          <div class="stat-ico ico-green"><i class="fas fa-check-circle"></i></div>
          <div>
            <div class="stat-val" id="stat-completed">0</div>
            <div class="stat-lbl">Courses Completed</div>
          </div>
        </div>
        <div class="dash-stat">
          <div class="stat-ico ico-amber"><i class="fas fa-star"></i></div>
          <div>
            <div class="stat-val">4.9</div>
            <div class="stat-lbl">Platform Rating</div>
          </div>
        </div>
      </div>

      <!-- Enrolled Courses -->
      <div id="enrolled-section">
        <div class="section-title">
          My Enrolled Courses
          <a href="/courses">Browse more <i class="fas fa-arrow-right"></i></a>
        </div>
        <div id="enrolled-container">
          <!-- Skeleton loader -->
          <div class="enrolled-grid" id="skeleton-grid">
            <div style="border-radius:12px;overflow:hidden;border:1px solid var(--clr-border);">
              <div class="skeleton" style="height:140px;border-radius:0;"></div>
              <div style="padding:16px;">
                <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:18px;width:85%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:6px;"></div>
              </div>
            </div>
            <div style="border-radius:12px;overflow:hidden;border:1px solid var(--clr-border);">
              <div class="skeleton" style="height:140px;border-radius:0;"></div>
              <div style="padding:16px;">
                <div class="skeleton" style="height:14px;width:60%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:18px;width:85%;margin-bottom:10px;"></div>
                <div class="skeleton" style="height:6px;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Apply saved theme
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    // Auth guard
    async function checkAuth() {
      try {
        const res  = await fetch('/api/auth/me', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          localStorage.removeItem('as_user');
          window.location.href = '/login';
          return null;
        }
        return data.user;
      } catch {
        window.location.href = '/login';
        return null;
      }
    }

    function renderEnrolled(enrollments) {
      const container = document.getElementById('enrolled-container');
      document.getElementById('skeleton-grid')?.remove();

      if (!enrollments || enrollments.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-book-open"></i>
            <h3>No courses yet</h3>
            <p>You haven't enrolled in any courses. Start learning today!</p>
            <a href="/courses" class="btn btn-primary">Browse Courses <i class="fas fa-arrow-right"></i></a>
          </div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'enrolled-grid';

      enrollments.forEach(course => {
        const progress = course.progress || Math.floor(Math.random() * 60) + 5;
        const card = document.createElement('div');
        card.className = 'enrolled-card';
        card.innerHTML = `
          <img class="enrolled-img" src="${course.image_url || 'https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=400&q=75'}" alt="${course.title}" loading="lazy"/>
          <div class="enrolled-body">
            <span class="enrolled-category">${course.category}</span>
            <div class="enrolled-title">${course.title}</div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${progress}%;"></div>
            </div>
            <div class="progress-label">${progress}% complete · ${course.duration}</div>
          </div>
          <div class="enrolled-footer">
            <a href="/courses" class="continue-btn"><i class="fas fa-play"></i> Continue</a>
            <span class="enrolled-instructor"><i class="fas fa-user"></i> ${course.instructor}</span>
          </div>`;
        grid.appendChild(card);
      });

      container.appendChild(grid);
      document.getElementById('stat-enrolled').textContent  = enrollments.length;
      document.getElementById('stat-completed').textContent = enrollments.filter(e => (e.progress || 0) >= 100).length;
    }

    async function init() {
      const user = await checkAuth();
      if (!user) return;

      // Update sidebar
      const initials = user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('sb-avatar').textContent = initials;
      document.getElementById('sb-name').textContent   = user.name;
      document.getElementById('sb-email').textContent  = user.email;

      // Welcome message
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
      document.getElementById('welcome-msg').textContent = `${greeting}, ${user.name.split(' ')[0]}! 👋`;
      document.title = `Dashboard — ${user.name} | Apna Shiksharth`;

      // Joined date
      const joined = new Date(user.created_at).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
      document.getElementById('welcome-sub').textContent = `Member since ${joined} · Keep learning!`;

      renderEnrolled(user.enrollments || []);
    }

    // Logout
    async function doLogout() {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      localStorage.removeItem('as_user');
      localStorage.removeItem('as_token');
      window.location.href = '/';
    }
    document.getElementById('logout-btn').addEventListener('click', doLogout);
    document.getElementById('sb-logout').addEventListener('click', e => { e.preventDefault(); doLogout(); });

    init();
  </script>
</body>
</html>
